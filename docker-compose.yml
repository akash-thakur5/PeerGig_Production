version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: peergig-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: peergig
      POSTGRES_PASSWORD: peergig_secret
      POSTGRES_DB: peergig
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peergig -d peergig"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
